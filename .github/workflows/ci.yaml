name: CI — GreenLogistics

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-test-scan:
    name: "${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: parcel-api
            runtime: python
          - service: gps-ingestor
            runtime: python
          - service: notifier
            runtime: node
          - service: tracker-front
            runtime: node
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python services ───────────────────────────────────────────────────────
      - name: Setup Python
        if: matrix.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/${{ matrix.service }}/requirements-dev.txt

      - name: Lint + Tests (Python)
        if: matrix.runtime == 'python'
        working-directory: services/${{ matrix.service }}
        run: |
          pip install -r requirements-dev.txt
          ruff check src/ tests/
          pytest --tb=short -q

      # ── Node.js services ──────────────────────────────────────────────────────
      - name: Setup Node.js
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Lint + Tests (Node.js)
        if: matrix.runtime == 'node'
        working-directory: services/${{ matrix.service }}
        run: |
          npm ci
          npm run lint
          npm test

      # ── Docker build + push (commun) ──────────────────────────────────────────
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/greenlogistics/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/greenlogistics/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy — scan CVE
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.OWNER }}/greenlogistics/${{ matrix.service }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: sarif
          output: trivy-${{ matrix.service }}.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

  update-gitops:
    name: Bump tags in gitops repo
    runs-on: ubuntu-latest
    needs: build-test-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/greenlogistics-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update image tags
        run: |
          cd gitops
          for svc in parcel-api gps-ingestor notifier tracker-front; do
            sed -i "s|ghcr.io/${{ env.OWNER }}/greenlogistics/${svc}:.*|ghcr.io/${{ env.OWNER }}/greenlogistics/${svc}:${{ github.sha }}|g" \
              k8s/${svc}/deployment.yaml 2>/dev/null || true
          done

          git config user.email "ci@greenlogistics.local"
          git config user.name "GreenLogistics CI"
          git add -A
          git diff --staged --quiet || \
            git commit -m "chore: bump images to ${{ github.sha }}"
          git push
