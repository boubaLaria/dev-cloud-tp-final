kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: greenlogistics
nodes:
  - role: control-plane
    extraPortMappings:
      - { containerPort: 80,    hostPort: 8080,  protocol: TCP }
      - { containerPort: 443,   hostPort: 8443,  protocol: TCP }
      - { containerPort: 30080, hostPort: 30080, protocol: TCP }  # ArgoCD UI
      - { containerPort: 30090, hostPort: 30090, protocol: TCP }  # Grafana
      - { containerPort: 30091, hostPort: 30091, protocol: TCP }  # Kubecost
  - role: worker
  - role: worker
