# HPA sur gps-ingestor — service le plus sollicité (1 req/5s par livreur)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gps-ingestor-hpa
  namespace: app
  labels:
    app: gps-ingestor
    team: greenlogistics
    env: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gps-ingestor
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
