apiVersion: apps/v1
kind: Deployment
metadata:
  name: gps-ingestor
  namespace: app
  labels:
    app: gps-ingestor
    team: greenlogistics
    env: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gps-ingestor
  template:
    metadata:
      labels:
        app: gps-ingestor
        team: greenlogistics
        env: production
    spec:
      containers:
        - name: gps-ingestor
          image: ghcr.io/OWNER/greenlogistics/gps-ingestor:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: REDPANDA_BROKERS
              value: "redpanda.messaging.svc.cluster.local:9092"
            - name: TOPIC_GPS_POSITIONS
              value: "gps.positions"
            - name: TOPIC_DLQ
              value: "gps.positions.dlq"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
