apiVersion: apps/v1
kind: Deployment
metadata:
  name: parcel-api
  namespace: app
  labels:
    app: parcel-api
    team: greenlogistics
    env: production
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: parcel-api
  template:
    metadata:
      labels:
        app: parcel-api
        team: greenlogistics
        env: production
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: parcel-api-sa
      containers:
        - name: parcel-api
          image: ghcr.io/boubalaria/greenlogistics/parcel-api:bedeeec09e2b4acbab45ac212791500b1ad42333
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: parcel-api-sa
  namespace: app
  labels:
    app: parcel-api
    team: greenlogistics
