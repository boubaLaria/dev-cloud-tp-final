# ClusterSecretStore — pointe sur Vault dev-mode
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          namespace: external-secrets
          key: token
---
# ExternalSecret — synchronise DATABASE_URL depuis Vault vers K8s Secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: parcel-api-secrets
  namespace: app
  labels:
    team: greenlogistics
    env: production
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: api-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: greenlogistics/api
        property: database_url
