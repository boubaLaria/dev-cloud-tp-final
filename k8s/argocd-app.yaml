---
# App of Apps : racine ArgoCD qui pointe vers le dépôt gitops
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: greenlogistics
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/OWNER/greenlogistics-gitops.git
    targetRevision: main
    path: apps        # dossier contenant les Application enfants
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# Application enfant : parcel-api
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: parcel-api
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/OWNER/greenlogistics-gitops.git
    targetRevision: main
    path: manifests/parcel-api
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
