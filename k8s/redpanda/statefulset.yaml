---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redpanda-config
  namespace: messaging
data:
  redpanda.yaml: |
    redpanda:
      developer_mode: true
      data_directory: /var/lib/redpanda/data
      rpc_server:
        address: 0.0.0.0
        port: 33145
      kafka_api:
        - address: 0.0.0.0
          port: 9092
      admin:
        - address: 0.0.0.0
          port: 9644
      memory:
        reserve_memory: 0
    rpk:
      overprovisioned: true
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: messaging
  labels:
    app: redpanda
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
          command:
            - /usr/bin/rpk
            - redpanda
            - start
            - --overprovisioned
            - --smp
            - "1"
            - --memory
            - "256M"
            - --reserve-memory
            - "0M"
          ports:
            - containerPort: 9092
              name: kafka
            - containerPort: 9644
              name: admin
            - containerPort: 33145
              name: rpc
          resources:
            requests:
              cpu: "200m"
              memory: "400Mi"
            limits:
              cpu: "1"
              memory: "600Mi"
          readinessProbe:
            httpGet:
              path: /v1/status/ready
              port: 9644
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: messaging
  labels:
    app: redpanda
spec:
  selector:
    app: redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: admin
      port: 9644
      targetPort: 9644
